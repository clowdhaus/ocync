[advisories]
version = 2
ignore = [
  # number_prefix is unmaintained but is a transitive dep of indicatif
  # (used only for byte-count formatting in progress bars, which we don't use —
  # our bars are spinners). No security impact, just an unmaintained notice.
  "RUSTSEC-2025-0119",
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "Unlicense",
  "MPL-2.0",
  "Unicode-3.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
private = { ignore = true }

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
