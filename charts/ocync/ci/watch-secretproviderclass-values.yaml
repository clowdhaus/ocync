## Smoke fixture: watch-mode deployment using CSI Secrets Store Driver to
## mount AWS Secrets Manager values as files, with optional sync into a
## native K8s Secret consumed via envFrom.
mode: watch

config:
  registries:
    src:
      url: cgr.dev
    dst:
      url: docker.io/example/mirror
      auth_type: basic
  defaults:
    source: src
    targets:
      - dst
  mappings:
    - from: chainguard/static
      to: example/static

secretProviderClass:
  enabled: true
  provider: aws
  parameters:
    objects: |
      - objectName: prod/ocync/docker-username
        objectAlias: DOCKER_USERNAME
        objectType: secretsmanager
      - objectName: prod/ocync/docker-password
        objectAlias: DOCKER_PASSWORD
        objectType: secretsmanager
  secretObjects:
    - secretName: ocync-credentials
      type: Opaque
      data:
        - objectName: DOCKER_USERNAME
          key: DOCKER_USERNAME
        - objectName: DOCKER_PASSWORD
          key: DOCKER_PASSWORD

extraVolumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: ocync

extraVolumeMounts:
  - name: secrets-store
    mountPath: /mnt/secrets-store
    readOnly: true

envFrom:
  - secretRef:
      name: ocync-credentials
