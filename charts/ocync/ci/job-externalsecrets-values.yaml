## Smoke fixture: one-shot Job pulling registry credentials via ExternalSecrets.
## ESO writes a K8s Secret named `ocync-credentials`, and the Job consumes it
## via envFrom in the same render.
mode: job

config:
  registries:
    src:
      url: cgr.dev
    dst:
      url: docker.io/example/mirror
      auth_type: basic
  defaults:
    source: src
    targets:
      - dst
  mappings:
    - from: chainguard/static
      to: example/static

externalSecrets:
  enabled: true
  refreshInterval: "30m"
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: ocync-credentials
    creationPolicy: Owner
  data:
    - secretKey: DOCKER_USERNAME
      remoteRef:
        key: prod/ocync/docker-username
    - secretKey: DOCKER_PASSWORD
      remoteRef:
        key: prod/ocync/docker-password

envFrom:
  - secretRef:
      name: ocync-credentials
