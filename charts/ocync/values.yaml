# -- Deployment mode: `watch` (Deployment with sync interval), `cronjob` (CronJob), or `job` (one-shot Job).
mode: watch

image:
  # -- Container image repository.
  repository: public.ecr.aws/clowdhaus/ocync
  # -- Container image tag.
  # @default -- `<chart-app-version>-fips`
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Image pull secrets for the workload pods.
imagePullSecrets: []
# -- Override the chart name used in resource names and labels.
nameOverride: ""
# -- Override the fully-qualified release name (overrides `<release>-<chartname>`).
fullnameOverride: ""

serviceAccount:
  # -- Whether the chart should create a ServiceAccount for the workload.
  create: true
  # -- Annotations to add to the ServiceAccount. Composed with `workloadIdentity` (user-set keys win).
  annotations: {}
  # -- Override the ServiceAccount name (defaults to the chart fullname).
  name: ""

# -- ocync configuration YAML, rendered into a ConfigMap mounted at `/etc/ocync/config.yaml`.
# `global.cache_dir` is auto-injected as `/tmp/ocync-cache` if not set, so the transfer
# state cache and blob staging area land in the writable `/tmp` emptyDir.
# @default -- `{}` (you must supply registries, defaults, and mappings)
config: {}

watch:
  # -- Sync interval in seconds (watch mode only).
  interval: 300
  # -- Health check port (watch mode only). Exposed via Service and used by liveness/readiness probes.
  healthPort: 8080

cronjob:
  # -- Cron schedule expression (cronjob mode only).
  schedule: "0 */6 * * *"
  # -- Number of successful CronJob runs to retain.
  successfulJobsHistoryLimit: 3
  # -- Number of failed CronJob runs to retain.
  failedJobsHistoryLimit: 3
  # -- CronJob concurrency policy: `Allow` | `Forbid` | `Replace`.
  concurrencyPolicy: Forbid

# -- Additional CLI arguments appended to the container args after the mode-specific defaults.
extraArgs: []

# -- Additional environment variables for the container. Set `AWS_USE_FIPS_ENDPOINT=true` to route
# ECR API calls through FIPS endpoints.
env: []

# -- envFrom sources (Secret/ConfigMap references). Use for token-based auth: DOCKER_PASSWORD,
# GITHUB_TOKEN, chainctl tokens. The referenced resource must already exist or be created
# alongside (e.g. via `externalSecrets`).
envFrom: []

# -- Additional pod volumes appended to the workload's volumes list. Use for docker-config.json
# from a Secret, CA bundles, GCP SA key files, or CSI-driven secret stores.
extraVolumes: []

# -- Additional container volume mounts appended to volumeMounts. Pair each entry with an
# `extraVolumes` entry of the same name.
extraVolumeMounts: []

# -- Pod-level annotations. Required for Vault Agent Injector
# (`vault.hashicorp.com/agent-inject`) and service-mesh sidecars
# (`linkerd.io/inject`, `sidecar.istio.io/inject`).
podAnnotations: {}

# -- Annotations applied to the Deployment's `metadata.annotations` when
# `mode: watch`. Use for controllers that key off workload-level metadata:
# Stakater Reloader (`reloader.stakater.com/auto`), Argo Rollouts notification
# subscriptions, etc. Pod-template annotations belong under `podAnnotations`.
deploymentAnnotations: {}

# -- Annotations applied to the CronJob's `metadata.annotations` when
# `mode: cronjob`. Common uses: Helm lifecycle hooks (`helm.sh/hook`), Argo CD
# sync-wave / hook annotations, policy-controller selectors (Kyverno, Gatekeeper),
# cost-allocation tags. Pod-template annotations belong under `podAnnotations`.
cronJobAnnotations: {}

# -- Annotations applied to the Job's `metadata.annotations` when `mode: job`.
# Common uses: Helm lifecycle hooks (`helm.sh/hook: post-install` etc.), Argo CD
# sync-wave / hook annotations on one-shot Jobs, policy-controller selectors.
# Pod-template annotations belong under `podAnnotations`.
jobAnnotations: {}

# -- Pod-level labels. Composed with `workloadIdentity.podLabels` (the chart sets
# `azure.workload.identity/use: "true"` automatically when `workloadIdentity.provider` is `azure`).
podLabels: {}

# External Secrets Operator (ESO) integration.
# Generates an ExternalSecret resource (external-secrets.io/v1) that pulls
# from a SecretStore/ClusterSecretStore and writes a native K8s Secret which
# the workload then consumes via envFrom or extraVolumes.
#
# Requires: external-secrets-operator installed cluster-side. The chart does
# not pre-check CRD presence; if missing, `kubectl apply` returns
# `no matches for kind "ExternalSecret"` -- the standard, debuggable failure.
externalSecrets:
  # -- Render an ExternalSecret resource.
  enabled: false
  # -- ExternalSecret refresh interval.
  refreshInterval: "1h"
  # -- Reference to the SecretStore / ClusterSecretStore. Shape: `{ name, kind: SecretStore | ClusterSecretStore }`.
  secretStoreRef: {}
  # -- Target K8s Secret to create. Shape: `{ name?: string, creationPolicy?: Owner | Orphan }`. Defaults to chart fullname / `Owner`.
  target: {}
  # -- Mapping of secret keys to remote references. Shape: `[{ secretKey, remoteRef: { key, property? } }]`.
  data: []

# CSI Secrets Store Driver integration.
# Generates a SecretProviderClass (secrets-store.csi.x-k8s.io/v1) that the
# CSI driver uses to mount secrets from a cloud secret store as files (and
# optionally sync into K8s Secrets). The pod must reference the resulting
# SecretProviderClass via extraVolumes (csi: driver: secrets-store.csi.k8s.io).
#
# Requires: secrets-store-csi-driver + provider plugin (aws/azure/gcp/vault)
# installed cluster-side.
secretProviderClass:
  # -- Render a SecretProviderClass resource.
  enabled: false
  # -- Provider plugin: `aws` | `azure` | `gcp` | `vault`.
  provider: ""
  # -- Provider-specific parameters (free-form map).
  parameters: {}
  # -- Optional K8s Secret sync targets. Shape: `[{ secretName, type, data: [{ objectName, key }] }]`.
  secretObjects: []

# Workload Identity convenience block.
# Sets the appropriate ServiceAccount annotations and pod labels for the
# chosen cloud provider. Composes with `serviceAccount.annotations` and
# `podLabels` (both are merged in; user-set keys win on conflict).
#
# EKS Pod Identity is intentionally not represented here -- it is
# configured cluster-side via PodIdentityAssociation, not the pod spec.
# See docs/src/content/registries/ecr.md for the alternative path.
workloadIdentity:
  # -- Workload identity provider: `none` | `aws` | `gcp` | `azure`.
  provider: none

  aws:
    # -- IAM role ARN to assume via IRSA. Sets `eks.amazonaws.com/role-arn` on the ServiceAccount.
    roleArn: ""

  gcp:
    # -- GSA email for GKE Workload Identity. Sets `iam.gke.io/gcp-service-account` on the ServiceAccount.
    serviceAccount: ""

  azure:
    # -- AAD app client ID. Sets `azure.workload.identity/client-id` on the ServiceAccount AND
    # `azure.workload.identity/use: "true"` on the pod (the latter is the critical pod label
    # without which the AAD webhook does not inject the projected SA token).
    clientId: ""
    # -- AAD tenant ID (optional). When set, adds `azure.workload.identity/tenant-id` to the ServiceAccount.
    tenantId: ""

# -- Resource requests and limits. ocync is single-threaded (tokio current_thread) but network-bound
# during sync. CPU request influences Karpenter instance-type selection; 500m ensures the workload
# has enough weight to steer toward network-optimized nodes. Peak RSS observed at ~58 MB during full
# cold sync (42 images).
resources:
  requests:
    cpu: 500m
    memory: 128Mi
    ephemeral-storage: 1Gi
  limits:
    memory: 256Mi
    ephemeral-storage: 2Gi

# -- Node selector for the pod.
nodeSelector: {}

# -- Tolerations for the pod.
tolerations: []

# -- Pod affinity / anti-affinity. Defaults to preferring EC2 network-optimized instance types
# (`c5n` / `c6in` / `m5n` / `m6in` / `r5n` / `r6in` families, 25-200 Gbps). Soft preference --
# pods schedule on any node if these are unavailable. Override with `affinity: {}` to disable.
# @default -- See [values.yaml](./values.yaml) for the full instance-type list.
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - c5n.large
                - c5n.xlarge
                - c5n.2xlarge
                - c5n.4xlarge
                - c5n.9xlarge
                - c5n.18xlarge
                - c6in.large
                - c6in.xlarge
                - c6in.2xlarge
                - c6in.4xlarge
                - c6in.8xlarge
                - c6in.12xlarge
                - c6in.16xlarge
                - c6in.24xlarge
                - c6in.32xlarge
                - m5n.large
                - m5n.xlarge
                - m5n.2xlarge
                - m5n.4xlarge
                - m5n.8xlarge
                - m5n.12xlarge
                - m5n.16xlarge
                - m5n.24xlarge
                - m6in.large
                - m6in.xlarge
                - m6in.2xlarge
                - m6in.4xlarge
                - m6in.8xlarge
                - m6in.12xlarge
                - m6in.16xlarge
                - m6in.24xlarge
                - m6in.32xlarge
                - r5n.large
                - r5n.xlarge
                - r5n.2xlarge
                - r5n.4xlarge
                - r5n.8xlarge
                - r5n.12xlarge
                - r5n.16xlarge
                - r5n.24xlarge
                - r6in.large
                - r6in.xlarge
                - r6in.2xlarge
                - r6in.4xlarge
                - r6in.8xlarge
                - r6in.12xlarge
                - r6in.16xlarge
                - r6in.24xlarge
                - r6in.32xlarge

# -- Pod security context.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
