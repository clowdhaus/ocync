## Behavioral assertions on _pod.tpl across the three workload modes.
## Asserts the partial routes args, ports/probes, restartPolicy, and the
## checksum/config annotation correctly per .Values.mode.
suite: pod template (_pod.tpl)

templates:
  - deployment.yaml
  - cronjob.yaml
  - job.yaml

tests:
  - it: watch mode renders the full container args list
    set:
      mode: watch
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - watch
            - --config
            - /etc/ocync/config.yaml
            - --interval
            - "300"
            - --health-port
            - "8080"
            - --health-bind
            - "0.0.0.0"

  - it: watch.healthBind override flows through to container args
    set:
      mode: watch
      watch:
        healthBind: "::"
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "::"

  - it: extraArgs --health-bind suppresses the chart's own --health-bind to avoid duplicate flags
    set:
      mode: watch
      extraArgs:
        - --health-bind
        - 127.0.0.1
    template: deployment.yaml
    asserts:
      # Total args = 7 watch defaults (no --health-bind) + 2 extraArgs.
      - lengthEqual:
          path: spec.template.spec.containers[0].args
          count: 9
      - contains:
          path: spec.template.spec.containers[0].args
          content: "127.0.0.1"

  - it: cronjob mode renders the full container args list
    set:
      mode: cronjob
    template: cronjob.yaml
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].args
          value:
            - sync
            - --config
            - /etc/ocync/config.yaml

  - it: job mode renders the full container args list
    set:
      mode: job
    template: job.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - sync
            - --config
            - /etc/ocync/config.yaml

  - it: watch mode has health port and probes
    set:
      mode: watch
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: cronjob mode has no ports or probes
    set:
      mode: cronjob
    template: cronjob.yaml
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.template.spec.containers[0].ports
      - notExists:
          path: spec.jobTemplate.spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.jobTemplate.spec.template.spec.containers[0].readinessProbe

  - it: job mode has no ports or probes
    set:
      mode: job
    template: job.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].ports
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: watch mode does not set restartPolicy (defaults Always)
    set:
      mode: watch
    template: deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.restartPolicy

  - it: cronjob mode sets restartPolicy OnFailure
    set:
      mode: cronjob
    template: cronjob.yaml
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: OnFailure

  - it: job mode sets restartPolicy OnFailure
    set:
      mode: job
    template: job.yaml
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: OnFailure

  - it: watch mode adds checksum/config pod annotation
    set:
      mode: watch
    template: deployment.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: cronjob mode does not add checksum/config annotation
    set:
      mode: cronjob
    template: cronjob.yaml
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.template.metadata.annotations

  - it: job mode does not add checksum/config annotation
    set:
      mode: job
    template: job.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: deploymentAnnotations renders on the Deployment metadata (watch mode)
    set:
      mode: watch
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"
    template: deployment.yaml
    asserts:
      - equal:
          path: metadata.annotations["reloader.stakater.com/auto"]
          value: "true"
      - notExists:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]

  - it: cronJobAnnotations renders on the CronJob metadata (cronjob mode)
    set:
      mode: cronjob
      cronJobAnnotations:
        helm.sh/hook: post-install
        argocd.argoproj.io/sync-wave: "5"
    template: cronjob.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "5"

  - it: jobAnnotations renders on the Job metadata (job mode)
    set:
      mode: job
      jobAnnotations:
        helm.sh/hook: post-install
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    template: job.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: per-mode values do not cross-render (deploymentAnnotations ignored in cronjob mode)
    set:
      mode: cronjob
      deploymentAnnotations:
        should-not-appear: "true"
    template: cronjob.yaml
    asserts:
      - notExists:
          path: metadata.annotations

  - it: per-mode values do not cross-render (jobAnnotations ignored in watch mode)
    set:
      mode: watch
      jobAnnotations:
        should-not-appear: "true"
    template: deployment.yaml
    asserts:
      - notExists:
          path: metadata.annotations

  - it: deploymentAnnotations omitted produces no metadata.annotations on Deployment
    set:
      mode: watch
    template: deployment.yaml
    asserts:
      - notExists:
          path: metadata.annotations

  - it: cronJobAnnotations omitted produces no metadata.annotations on CronJob
    set:
      mode: cronjob
    template: cronjob.yaml
    asserts:
      - notExists:
          path: metadata.annotations

  - it: jobAnnotations omitted produces no metadata.annotations on Job
    set:
      mode: job
    template: job.yaml
    asserts:
      - notExists:
          path: metadata.annotations

