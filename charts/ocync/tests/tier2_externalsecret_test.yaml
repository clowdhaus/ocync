## ExternalSecret (external-secrets.io/v1) gated rendering and field plumbing.
suite: tier 2 - ExternalSecret

templates:
  - externalsecret.yaml

tests:
  - it: not rendered when externalSecrets.enabled is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: rendered with apiVersion external-secrets.io/v1 when enabled
    set:
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: aws-secret-store
          kind: ClusterSecretStore
        target:
          name: ocync-credentials
        data:
          - secretKey: DOCKER_PASSWORD
            remoteRef:
              key: prod/ocync/docker-password
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: kind
          value: ExternalSecret

  - it: refreshInterval defaults to 1h when unset
    set:
      externalSecrets:
        enabled: true
        secretStoreRef: { name: store, kind: SecretStore }
        target: { name: t }
        data:
          - { secretKey: K, remoteRef: { key: k } }
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 1h

  - it: refreshInterval honors user value
    set:
      externalSecrets:
        enabled: true
        refreshInterval: 30m
        secretStoreRef: { name: store, kind: SecretStore }
        target: { name: t }
        data:
          - { secretKey: K, remoteRef: { key: k } }
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 30m

  - it: target.name defaults to the chart fullname when unset
    set:
      externalSecrets:
        enabled: true
        secretStoreRef: { name: store, kind: SecretStore }
        data:
          - { secretKey: K, remoteRef: { key: k } }
    release:
      name: tr
    asserts:
      - equal:
          path: spec.target.name
          value: tr-ocync

  - it: target.creationPolicy defaults to Owner
    set:
      externalSecrets:
        enabled: true
        secretStoreRef: { name: store, kind: SecretStore }
        target: { name: t }
        data:
          - { secretKey: K, remoteRef: { key: k } }
    asserts:
      - equal:
          path: spec.target.creationPolicy
          value: Owner

  - it: secretStoreRef plumbs through verbatim
    set:
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: aws-secret-store
          kind: ClusterSecretStore
        target: { name: t }
        data:
          - { secretKey: K, remoteRef: { key: k } }
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: aws-secret-store
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore

  - it: data entries plumb through verbatim
    set:
      externalSecrets:
        enabled: true
        secretStoreRef: { name: store, kind: SecretStore }
        target: { name: t }
        data:
          - secretKey: DOCKER_USERNAME
            remoteRef:
              key: prod/ocync/docker-username
          - secretKey: DOCKER_PASSWORD
            remoteRef:
              key: prod/ocync/docker-password
    asserts:
      - lengthEqual:
          path: spec.data
          count: 2
      - equal:
          path: spec.data[0].secretKey
          value: DOCKER_USERNAME
      - equal:
          path: spec.data[1].remoteRef.key
          value: prod/ocync/docker-password
