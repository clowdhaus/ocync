## Tier 1 secret-injection wiring: envFrom, extraVolumes, extraVolumeMounts,
## podAnnotations, podLabels.  Asserts that user-supplied values flow into
## the right paths in the rendered pod spec, and that defaults render no
## extra fields.
suite: tier 1 (envFrom, extraVolumes, podAnnotations, podLabels)

templates:
  - deployment.yaml

tests:
  - it: envFrom not rendered by default
    set:
      mode: watch
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: envFrom flows through to the container
    set:
      mode: watch
      envFrom:
        - secretRef:
            name: ocync-credentials
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: ocync-credentials

  - it: extraVolumes appended after the built-in volumes
    set:
      mode: watch
      extraVolumes:
        - name: docker-config
          secret:
            secretName: my-creds
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: config
      - equal:
          path: spec.template.spec.volumes[1].name
          value: tmp
      - equal:
          path: spec.template.spec.volumes[2].name
          value: docker-config
      - equal:
          path: spec.template.spec.volumes[2].secret.secretName
          value: my-creds

  - it: extraVolumeMounts appended after the built-in mounts
    set:
      mode: watch
      extraVolumeMounts:
        - name: docker-config
          mountPath: /home/nonroot/.docker
          readOnly: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: config
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: tmp
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].name
          value: docker-config
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].mountPath
          value: /home/nonroot/.docker

  - it: podAnnotations merge with checksum/config in watch mode
    set:
      mode: watch
      podAnnotations:
        example.com/owner: platform
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]
      - equal:
          path: spec.template.metadata.annotations["example.com/owner"]
          value: platform

  - it: podLabels merge with selector labels
    set:
      mode: watch
      podLabels:
        team: platform
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: ocync
      - equal:
          path: spec.template.metadata.labels.team
          value: platform
