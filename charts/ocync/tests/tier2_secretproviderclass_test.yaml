## SecretProviderClass (secrets-store.csi.x-k8s.io/v1) gated rendering and
## field plumbing.
suite: tier 2 - SecretProviderClass

templates:
  - secretproviderclass.yaml

tests:
  - it: not rendered when secretProviderClass.enabled is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: rendered with apiVersion secrets-store.csi.x-k8s.io/v1 when enabled
    set:
      secretProviderClass:
        enabled: true
        provider: aws
        parameters:
          objects: |
            - objectName: prod/secret
              objectType: secretsmanager
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: secrets-store.csi.x-k8s.io/v1
      - equal:
          path: kind
          value: SecretProviderClass

  - it: provider field plumbs through
    set:
      secretProviderClass:
        enabled: true
        provider: azure
        parameters: { foo: bar }
    asserts:
      - equal:
          path: spec.provider
          value: azure

  - it: parameters plumb through verbatim
    set:
      secretProviderClass:
        enabled: true
        provider: aws
        parameters:
          objects: "- objectName: foo"
          region: us-east-1
    asserts:
      - equal:
          path: spec.parameters.region
          value: us-east-1

  - it: secretObjects optional, omitted when empty
    set:
      secretProviderClass:
        enabled: true
        provider: aws
        parameters: { foo: bar }
    asserts:
      - notExists:
          path: spec.secretObjects

  - it: secretObjects plumb through when provided
    set:
      secretProviderClass:
        enabled: true
        provider: aws
        parameters: { foo: bar }
        secretObjects:
          - secretName: ocync-credentials
            type: Opaque
            data:
              - objectName: DOCKER_PASSWORD
                key: DOCKER_PASSWORD
    asserts:
      - equal:
          path: spec.secretObjects[0].secretName
          value: ocync-credentials
      - equal:
          path: spec.secretObjects[0].data[0].objectName
          value: DOCKER_PASSWORD

  ## Negative test: enabling SPC without setting `provider` must fail loudly.
  ## Previously the empty-string default rendered as `provider:` (null), which
  ## kubeconform rejected with an opaque schema error rather than naming the
  ## misconfigured field.
  - it: enabling SPC without provider fails with a clear message
    templates:
      - secretproviderclass.yaml
    set:
      secretProviderClass:
        enabled: true
        parameters: { foo: bar }
    asserts:
      - failedTemplate:
          errorMessage: "ocync: secretProviderClass.provider is required when secretProviderClass.enabled is true (one of: aws, azure, gcp, vault)"
