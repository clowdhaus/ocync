{{- if eq .Values.mode "job" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ocync.fullname" . }}
  labels:
    {{- include "ocync.labels" . | nindent 4 }}
  {{- with .Values.jobAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  template:
    {{- include "ocync.podTemplate" . | nindent 4 }}
{{- end }}
