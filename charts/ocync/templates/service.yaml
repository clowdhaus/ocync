{{- if eq .Values.mode "watch" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ocync.fullname" . }}
  labels:
    {{- include "ocync.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.watch.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "ocync.selectorLabels" . | nindent 4 }}
{{- end }}
