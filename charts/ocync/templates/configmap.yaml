{{- include "ocync.validate" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ocync.fullname" . }}
  labels:
    {{- include "ocync.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- /* Inject cache_dir so staging and cache use the writable /tmp emptyDir */ -}}
    {{- $config := deepCopy .Values.config -}}
    {{- $global := $config.global | default dict -}}
    {{- if not (hasKey $global "cache_dir") -}}
      {{- $_ := set $global "cache_dir" "/tmp/ocync-cache" -}}
    {{- end -}}
    {{- $_ := set $config "global" $global -}}
    {{- toYaml $config | nindent 4 }}
