name: Setup Rust
description: Install Rust toolchain with caching

inputs:
  components:
    description: Additional components to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: stable
        cache: false

    - name: Install CMake
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get install -y -qq cmake

    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      with:
        toolchain: "1.95"
        components: ${{ inputs.components }}

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-registry-${{ runner.os }}-${{ runner.arch }}-
