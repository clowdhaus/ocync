name: Setup Rust
description: Install Rust toolchain with caching

inputs:
  components:
    description: Additional components to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
        cache: false

    - name: Install CMake
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get install -y -qq cmake

    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      with:
        toolchain: "1.95"
        components: ${{ inputs.components }}

    - name: Cache cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-registry-${{ runner.os }}-${{ runner.arch }}-
