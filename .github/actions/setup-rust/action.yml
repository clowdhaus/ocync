name: Setup Rust
description: Install Rust toolchain with caching

inputs:
  components:
    description: Additional components to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust (with components)
      if: inputs.components != ''
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      with:
        toolchain: stable
        components: ${{ inputs.components }}

    - name: Install Rust (minimal)
      if: inputs.components == ''
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
      with:
        toolchain: stable

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-registry-${{ runner.os }}-${{ runner.arch }}-
