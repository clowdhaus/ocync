name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ECR_REGISTRY: public.ecr.aws/clowdhaus
  IMAGE_NAME: ocync

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check tag matches Cargo.toml
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          CARGO_VERSION="$(sed -n '/^\[package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

  build-linux:
    name: Build Linux (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            artifact: ocync-fips-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: ocync-fips-linux-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build
        env:
          CARGO_BUILD_RUSTFLAGS: "-C target-feature=+crt-static"
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --locked
      - name: Verify static binary
        run: "! readelf -d target/${{ matrix.target }}/release/ocync | grep -q NEEDED"
      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/ocync ${{ matrix.artifact }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build
        run: cargo build --release --locked --no-default-features --features non-fips
      - name: Rename binary
        run: mv target/release/ocync ocync-macos-arm64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocync-macos-arm64
          path: ocync-macos-arm64

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build
        run: cargo build --release --locked --no-default-features --features non-fips
      - name: Rename binary
        shell: bash
        run: mv target/release/ocync.exe ocync-windows-amd64.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocync-windows-amd64
          path: ocync-windows-amd64.exe

  docker:
    name: Docker (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_PUBLIC_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        env:
          TAG: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-fips-${{ matrix.suffix }}
        run: |
          docker build --tag "$TAG" .
          docker push "$TAG"

  docker-manifest:
    name: Docker manifest
    runs-on: ubuntu-24.04
    needs: docker
    steps:
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_PUBLIC_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Create and push manifest (versioned)
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          docker manifest create \
            "$REGISTRY:$VERSION-fips" \
            "$REGISTRY:$VERSION-fips-amd64" \
            "$REGISTRY:$VERSION-fips-arm64"
          docker manifest push "$REGISTRY:$VERSION-fips"
      - name: Create and push manifest (latest)
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          docker manifest create \
            "$REGISTRY:latest-fips" \
            "$REGISTRY:$VERSION-fips-amd64" \
            "$REGISTRY:$VERSION-fips-arm64"
          docker manifest push "$REGISTRY:latest-fips"
      - name: Sign container images
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cosign sign --yes "$REGISTRY:$VERSION-fips"
          cosign sign --yes "$REGISTRY:latest-fips"

  helm:
    name: Helm
    runs-on: ubuntu-24.04
    needs: docker-manifest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_PUBLIC_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR Public (Helm)
        run: aws ecr-public get-login-password --region us-east-1 | helm registry login --username AWS --password-stdin public.ecr.aws
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package Helm chart
        run: helm package charts/ocync --version "${{ steps.version.outputs.VERSION }}" --app-version "${{ steps.version.outputs.VERSION }}"
      - name: Push Helm chart
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}
        run: helm push ocync-*.tgz "oci://$REGISTRY"

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-macos
      - build-windows
      - docker-manifest
      - helm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ocync-* > sha256sums.txt
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/ocync-*
      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            artifacts/ocync-*
            artifacts/sha256sums.txt
