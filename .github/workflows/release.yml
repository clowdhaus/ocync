name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ECR_REGISTRY: public.ecr.aws/clowdhaus
  IMAGE_NAME: ocync

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check tag matches Cargo.toml and Chart.yaml
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION="$(sed -n '/^\[workspace\.package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)"
          CHART_VERSION="$(sed -n 's/^version: //p' charts/ocync/Chart.yaml)"
          CHART_APP_VERSION="$(sed -n 's/^appVersion: "\(.*\)"/\1/p' charts/ocync/Chart.yaml)"
          fail=0
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error file=Cargo.toml::workspace.package.version is ${CARGO_VERSION}, tag is v${TAG_VERSION}"
            fail=1
          fi
          if [ "$CHART_VERSION" != "$TAG_VERSION" ]; then
            echo "::error file=charts/ocync/Chart.yaml::version is ${CHART_VERSION}, tag is v${TAG_VERSION}"
            fail=1
          fi
          if [ "$CHART_APP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error file=charts/ocync/Chart.yaml::appVersion is ${CHART_APP_VERSION}, tag is v${TAG_VERSION}"
            fail=1
          fi
          [ $fail -eq 0 ]

  build-linux:
    name: Build Linux (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            artifact: ocync-fips-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: ocync-fips-linux-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build
        env:
          CARGO_BUILD_RUSTFLAGS: "-C target-feature=+crt-static"
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --locked
      - name: Verify static binary
        run: "! readelf -d target/${{ matrix.target }}/release/ocync | grep -q NEEDED"
      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/ocync ${{ matrix.artifact }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build
        run: cargo build --release --locked --no-default-features --features non-fips
      - name: Rename binary
        run: mv target/release/ocync ocync-macos-arm64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocync-macos-arm64
          path: ocync-macos-arm64

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build
        run: cargo build --release --locked --no-default-features --features non-fips
      - name: Rename binary
        shell: bash
        run: mv target/release/ocync.exe ocync-windows-amd64.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocync-windows-amd64
          path: ocync-windows-amd64.exe

  docker:
    name: Docker (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_PUBLIC_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        env:
          TAG: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-fips-${{ matrix.suffix }}
        run: |
          docker build --tag "$TAG" .
          docker push "$TAG"

  docker-manifest:
    name: Docker manifest
    runs-on: ubuntu-24.04
    needs: docker
    steps:
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_PUBLIC_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Create and push manifest (versioned)
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          docker manifest create \
            "$REGISTRY:$VERSION-fips" \
            "$REGISTRY:$VERSION-fips-amd64" \
            "$REGISTRY:$VERSION-fips-arm64"
          docker manifest push "$REGISTRY:$VERSION-fips"
      - name: Create and push manifest (latest)
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          docker manifest create \
            "$REGISTRY:latest-fips" \
            "$REGISTRY:$VERSION-fips-amd64" \
            "$REGISTRY:$VERSION-fips-arm64"
          docker manifest push "$REGISTRY:latest-fips"
      - name: Sign container images
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cosign sign --yes "$REGISTRY:$VERSION-fips"
          cosign sign --yes "$REGISTRY:latest-fips"

  helm:
    name: Helm
    runs-on: ubuntu-24.04
    needs: docker-manifest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.ECR_PUBLIC_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR Public (Helm)
        run: aws ecr-public get-login-password --region us-east-1 | helm registry login --username AWS --password-stdin public.ecr.aws
      - name: Package Helm chart
        run: helm package charts/ocync
      - name: Push Helm chart
        env:
          REGISTRY: ${{ env.ECR_REGISTRY }}
        run: helm push ocync-*.tgz "oci://$REGISTRY"

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-macos
      - build-windows
      - docker-manifest
      - helm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ocync-* > sha256sums.txt
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/ocync-*
      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            artifacts/ocync-*
            artifacts/sha256sums.txt

  homebrew:
    name: Homebrew tap
    runs-on: ubuntu-24.04
    needs: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: clowdhaus/homebrew-taps
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release download "$TAG" --repo "$REPO" --pattern sha256sums.txt
      - name: Render formula
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          macos_arm=$(awk '$2 == "ocync-macos-arm64" { print $1 }' sha256sums.txt)
          linux_amd64=$(awk '$2 == "ocync-fips-linux-amd64" { print $1 }' sha256sums.txt)
          linux_arm64=$(awk '$2 == "ocync-fips-linux-arm64" { print $1 }' sha256sums.txt)
          for sha in "$macos_arm" "$linux_amd64" "$linux_arm64"; do
            [ -n "$sha" ] || { echo "missing sha in sha256sums.txt" >&2; exit 1; }
          done
          cat > Formula/ocync.rb <<EOF
          class Ocync < Formula
            desc "OCI registry sync tool"
            homepage "https://github.com/clowdhaus/ocync"
            version "${VERSION}"
            license "Apache-2.0"

            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/clowdhaus/ocync/releases/download/v#{version}/ocync-macos-arm64"
              sha256 "${macos_arm}"
            end

            if OS.linux? && Hardware::CPU.intel?
              url "https://github.com/clowdhaus/ocync/releases/download/v#{version}/ocync-fips-linux-amd64"
              sha256 "${linux_amd64}"
            end

            if OS.linux? && Hardware::CPU.arm?
              url "https://github.com/clowdhaus/ocync/releases/download/v#{version}/ocync-fips-linux-arm64"
              sha256 "${linux_arm64}"
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "ocync-macos-arm64" => "ocync"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "ocync-fips-linux-amd64" => "ocync"
              elsif OS.linux? && Hardware::CPU.arm?
                bin.install "ocync-fips-linux-arm64" => "ocync"
              end
            end

            def caveats
              <<~CAVEATS
                Linux builds use FIPS-validated AWS-LC.
              CAVEATS
            end
          end
          EOF
          rm sha256sums.txt
      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ocync.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping commit"
            exit 0
          fi
          git commit -m "ocync: ${VERSION}"
          git push
