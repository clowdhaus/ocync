# Benchmark image corpus.
#
# Sources: Quay.io, Docker Hub, Chainguard (cgr.dev), AWS Public ECR, SOCI workshop.
# Each image syncs to ECR under the bench/ prefix.
#
# Quay.io images (quay.io): Jupyter docker-stacks (canonical source since late 2023).
# Public, no auth required.
#
# Docker Hub images (docker.io): nvidia/cuda, pytorch/pytorch.
# These require authenticated pulls (100/hr free tier). Credentials
# are injected via DOCKERHUB_USERNAME and DOCKERHUB_ACCESS_TOKEN env vars.
# The remaining Docker Hub official images (alpine, nginx, redis, postgres,
# golang) are pulled from their public ECR mirrors instead to avoid
# unnecessary rate limit consumption.
#
# Ordering: mount-exercising images first (Jupyter family shares GB-sized base
# layers across distinct source names and therefore distinct target repos --
# the canonical cross-repo mount scenario). Use `--limit N` to scope the
# benchmark to the first N entries for fast iteration.

corpus:
  target_registry: "${BENCH_TARGET_REGISTRY}"
  target_prefix: "bench"

images:
  # ── Jupyter docker-stacks (cross-repo mount exercise) ──────────────────────
  # Canonical source is quay.io (moved from Docker Hub in late 2023).
  # Multi-stage lineage: base-notebook -> minimal-notebook -> scipy-notebook ->
  # (datascience|pyspark|tensorflow)-notebook. Each image is ~0.3-2.2 GB with
  # large shared base layers. Distinct source names -> distinct target repos ->
  # cross-repo mount candidates for the shared layers.
  - source: "quay.io/jupyter/base-notebook"
    tags: ["latest"]
  - source: "quay.io/jupyter/minimal-notebook"
    tags: ["latest"]
  - source: "quay.io/jupyter/scipy-notebook"
    tags: ["latest"]
  - source: "quay.io/jupyter/datascience-notebook"
    tags: ["latest"]
  - source: "quay.io/jupyter/pyspark-notebook"
    tags: ["latest"]
  - source: "quay.io/jupyter/tensorflow-notebook"
    tags: ["latest"]

  # ── NVIDIA CUDA (chunked-upload stress + intra-repo blob sharing) ─────────
  # NGC's nvcr.io requires auth; the docker.io/nvidia/cuda mirror is
  # anonymously pullable. 12.6.2 runtime/devel share ~1.5 GB across tags
  # (same target repo, so this exercises intra-repo dedup, not cross-repo
  # mount -- included for large-blob chunked-upload throughput).
  - source: "docker.io/nvidia/cuda"
    tags:
      - "12.6.2-base-ubuntu22.04"         # ~92 MB
      - "12.6.2-cudnn-runtime-ubuntu22.04" # ~2.1 GB
      - "12.6.2-cudnn-devel-ubuntu22.04"  # ~4.6 GB

  # ── PyTorch GPU (large single-tag throughput + minor-version dedup) ────────
  # Two runtime tags on the same CUDA version: heavy layer sharing between
  # PyTorch versions exercises minor-version dedup.
  - source: "docker.io/pytorch/pytorch"
    tags:
      - "2.11.0-cuda12.6-cudnn9-runtime"  # ~3.6 GB
      - "2.10.0-cuda12.6-cudnn9-runtime"  # ~3.6 GB

  # ── Chainguard free tier images (cgr.dev) ──────────────────────────────────
  # Small; useful for cross-repo mount stress when concurrency windows overlap
  # (all share the wolfi-base layer). Retained as historical baseline.
  - source: "cgr.dev/chainguard/static"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/busybox"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/git"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/go"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/python"
    tags: ["latest"]  # version-pinned tags (3.12 etc) are Chainguard paid-tier only
  - source: "cgr.dev/chainguard/node"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/nginx"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/redis"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/curl"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/wolfi-base"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/postgres"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/ruby"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/rust"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/jdk"
    tags: ["latest"]
  - source: "cgr.dev/chainguard/php"
    tags: ["latest"]

  # ── AWS Public ECR images ──────────────────────────────────────────────────
  - source: "public.ecr.aws/amazonlinux/amazonlinux"
    tags: ["2023", "2"]
  - source: "public.ecr.aws/ubuntu/ubuntu"
    tags: ["22.04", "20.04"]
  - source: "public.ecr.aws/aws-cli/aws-cli"
    tags: ["latest"]
  - source: "public.ecr.aws/lambda/python"
    tags: ["3.12", "3.11"]
  - source: "public.ecr.aws/lambda/nodejs"
    tags: ["20", "18"]
  - source: "public.ecr.aws/amazoncorretto/amazoncorretto"
    tags: ["21", "17"]
  - source: "public.ecr.aws/docker/library/postgres"
    tags: ["16", "15"]
  - source: "public.ecr.aws/docker/library/redis"
    tags: ["7", "6"]
  - source: "public.ecr.aws/docker/library/nginx"
    tags: ["1.27", "1.26"]
  - source: "public.ecr.aws/docker/library/golang"
    tags: ["1.22", "1.21"]

  # ── SOCI workshop images ──────────────────────────────────────────────────
  # Large multi-layer images from public.ecr.aws -- useful for chunked upload
  # and large-blob throughput; limited cross-repo mount potential (each image
  # is an independent build).
  - source: "public.ecr.aws/soci-workshop-examples/ffmpeg"
    tags: ["latest"] # ~500 MB
  - source: "public.ecr.aws/soci-workshop-examples/tensorflow"
    tags: ["latest"] # ~1.8 GB
  - source: "public.ecr.aws/soci-workshop-examples/tensorflow_gpu"
    tags: ["latest"] # ~5 GB, shares base with tensorflow
  - source: "public.ecr.aws/soci-workshop-examples/node"
    tags: ["latest"] # ~1 GB
  - source: "public.ecr.aws/soci-workshop-examples/mongo"
    tags: ["latest"] # ~700 MB
  - source: "public.ecr.aws/soci-workshop-examples/rabbitmq"
    tags: ["latest"] # ~250 MB
